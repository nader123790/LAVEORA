name: project_laveora
description: "Laveora Luxury System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.11.0
  cloud_firestore: ^5.6.2
  intl: ^0.20.2
  web: ^1.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/laveora_bg.jpg
    - assets/images/laveora_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

  assets:
    - assets/images/laveora_bg.jpg
    - assets/images/laveora_logo.png
    - assets/sounds/working.mp3
    - assets/sounds/done.mp3
    - assets/sounds/waiter.mp3